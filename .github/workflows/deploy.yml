name: Deploy to GitHub Pages

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify placeholders exist in file
        run: |
          echo "Checking for placeholders in index.html..."
          grep -c '__SHEETS_API_KEY__' index.html && echo "SHEETS placeholder found" || echo "SHEETS placeholder NOT found"
          grep -c '__MAPBOX_TOKEN__' index.html && echo "MAPBOX placeholder found" || echo "MAPBOX placeholder NOT found"

      - name: Inject API keys from secrets
        env:
          SHEETS_KEY: ${{ secrets.SHEETS_API_KEY }}
          MAPBOX_TOK: ${{ secrets.MAPBOX_TOKEN }}
        run: |
          sed -i "s|__SHEETS_API_KEY__|${SHEETS_KEY}|g" index.html
          sed -i "s|__MAPBOX_TOKEN__|${MAPBOX_TOK}|g" index.html

      - name: Verify injection succeeded
        run: |
          if grep -q '__SHEETS_API_KEY__' index.html; then
            echo "ERROR: SHEETS placeholder was NOT replaced - check secret name"
            exit 1
          else
            echo "SHEETS key injected successfully"
          fi
          if grep -q '__MAPBOX_TOKEN__' index.html; then
            echo "ERROR: MAPBOX placeholder was NOT replaced - check secret name"
            exit 1
          else
            echo "MAPBOX token injected successfully"
          fi

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
